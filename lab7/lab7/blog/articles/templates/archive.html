<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="archive">
    <div class="header">
        <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
        <div class="header-links">
            {% if user.is_authenticated %}
                <span class="welcome-message">Привет, {{ user.username }}!</span>
                <a href="{% url 'create_post' %}" class="btn-create">+ Новая статья</a>
                <a href="{% url 'logout' %}" class="auth-link">Выйти</a>
            {% else %}
                <a href="{% url 'login' %}" class="auth-link">Вход</a>
                <a href="{% url 'register' %}" class="auth-link">Регистрация</a>
            {% endif %}
        </div>
    </div>

    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <div class="post-managment">
                <h2 class="post-title">
                    <a href="{% url 'get_article' article_id=post.id %}">{{ post.title }}</a>
                </h2>
				<p class="fold-button">Свернуть</p>
            </div>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
            <div class="one-post-shadow"></div>
        </div>
        {% endfor %}
    </div>
	<script src="{% static 'js/helloworld.js' %}"></script>
	<script src="{% static 'js/fold-post.js' %}"></script>
</body>
</html>
