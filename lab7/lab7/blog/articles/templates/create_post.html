<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать статью</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="create-article">
    <div class="header">
        <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
    </div>
    <div class="content">
        <h1>Написать статью</h1>
        <form method="POST" class="post-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Заголовок:</label>
                <input type="text" name="title" id="title" value="{{ form.title }}" placeholder="Введите заголовок">
            </div>
            <div class="form-group">
                <label for="text">Текст статьи:</label>
                <textarea name="text" id="text" rows="10" placeholder="Введите текст статьи">{{ form.text }}</textarea>
            </div>
            <button type="submit" class="submit-btn">Сохранить</button>
        </form>
        {% if form.errors %}
            <div class="error">{{ form.errors }}</div>
        {% endif %}
    </div>
</body>
</html>
